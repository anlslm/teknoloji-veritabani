<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teknoloji Yol Haritası</title>
  <script src="app.js"></script>
  <style id="sayfa-css"></style>
  <script>document.getElementById('sayfa-css').textContent = ortakCSS();</script>
</head>
<body>

<script>sayfaKoruma('kullanici');</script>
<script>document.body.insertAdjacentHTML('afterbegin', sidebarHTML('roadmap.html'));</script>

<div class="main-wrap" style="overflow:hidden">
<div class="topbar">
  <span class="topbar-title">Yol Haritası</span>
  <div class="topbar-spacer"></div>
  <div style="display:flex;gap:8px;align-items:center">
    <span style="color:var(--text2);font-size:12px;font-weight:500">Ölçek:</span>
    <select id="zoom-sel" class="form-control"
            style="width:150px;padding:5px 8px;font-size:12px"
            onchange="yenidenRenderEt()">
      <option value="50">Geniş (Yıllık)</option>
      <option value="90" selected>Normal (Aylık)</option>
      <option value="140">Yakın (Detaylı)</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="bugunKaydır()">◎ Bugün</button>
    <button class="btn btn-primary btn-sm" onclick="location.href='form.html'">+ Yeni Kayıt</button>
  </div>
</div>

<!-- Filtre Çubuğu -->
<div id="filtre-cubugu">
  <!-- Sistem Filtresi -->
  <div class="sf-wrap" id="sistem-filtre">
    <div class="sf-trigger" id="sf-trigger" onclick="sfToggle('sf')">
      <span id="sf-label">Tüm Sistemler</span>
      <span class="sf-arrow" id="sf-arrow">▾</span>
    </div>
    <div class="sf-panel" id="sf-panel">
      <input type="text" id="sf-arama" class="sf-arama"
             placeholder="Sistem ara..." autocomplete="off"
             oninput="sfFiltrele('sf')">
      <div class="sf-liste" id="sf-liste"></div>
    </div>
  </div>

  <!-- Ürün Grubu Filtresi -->
  <div class="sf-wrap" id="ug-filtre">
    <div class="sf-trigger" id="ug-trigger" onclick="sfToggle('ug')">
      <span id="ug-label">Tüm Ürün Grupları</span>
      <span class="sf-arrow" id="ug-arrow">▾</span>
    </div>
    <div class="sf-panel" id="ug-panel">
      <input type="text" id="ug-arama" class="sf-arama"
             placeholder="Ürün grubu ara..." autocomplete="off"
             oninput="sfFiltrele('ug')">
      <div class="sf-liste" id="ug-liste"></div>
    </div>
  </div>

  <!-- Aktif / Pasif Filtresi -->
  <div class="aktif-seg">
    <button class="aktif-seg-btn secili" id="seg-tumumu" onclick="aktifSegSec('tumumu')">Tümü</button>
    <button class="aktif-seg-btn" id="seg-aktif"  onclick="aktifSegSec('aktif')">Aktif</button>
    <button class="aktif-seg-btn" id="seg-pasif"  onclick="aktifSegSec('pasif')">Pasif</button>
  </div>

  <div style="margin-left:auto;color:var(--text2);font-size:12px" id="rm-kayit-sayisi"></div>
</div>

<!-- Boş durum -->
<div id="bos-durum" style="display:none;height:calc(100vh - 104px);align-items:center;justify-content:center">
  <div class="empty-state">
    <div class="empty-state-icon">🗺️</div>
    <div class="empty-state-text">Yol haritasında gösterilecek kayıt yok</div>
    <div class="empty-state-sub">Geliştirme tarihleri girilmiş kayıtlar burada görünür.</div>
    <button class="btn btn-primary" style="margin-top:16px" onclick="location.href='form.html'">
      + Yeni Kayıt Ekle
    </button>
  </div>
</div>

<!-- Ana roadmap düzeni -->
<div id="roadmap-main" style="display:flex;height:calc(100vh - 104px);overflow:hidden">

  <!-- Sol panel: swimlane etiketleri -->

// ────────────────────────────────────────────────────
//  Sabitler
// ────────────────────────────────────────────────────
const TUR_SIRASI = ['Sistem', 'Alt Sistem', 'Komponent', 'Teknoloji'];

const EKSTRA_SWINLANELER = [
  { id: 'arge',      etiket: 'Ar-Ge Destekleri',   renk: '#9b6dff' },
  { id: 'fikri',     etiket: 'Fikri Haklar',        renk: '#ff6db0' },
  { id: 'inovasyon', etiket: 'İnovasyon Girdileri', renk: '#4fddcc' },
];
const EKSTRA_H_ACIK   = 72;
const EKSTRA_H_KAPALI = 36;

let gizliLaneler  = new Set();
let aktifSistemId = null;
let aktifUrunGrubu = null;
let aktifSegDurum = 'tumumu';   // 'tumumu' | 'aktif' | 'pasif'

const TR_AYLAR = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
const TL_H   = 52;
const ROW_H  = 50;
const SWIM_PAD = 14;

let MONTH_W    = 90;
let baseYear, baseMonth;

// ────────────────────────────────────────────────────
//  Piksel dönüşümü
// ────────────────────────────────────────────────────
function dateToX(dateStr) {
  if (!dateStr) return 0;
  const d = new Date(dateStr + 'T00:00:00');
  const totalM = (d.getFullYear() - baseYear) * 12 + (d.getMonth() - baseMonth);
  const dayFrac = (d.getDate() - 1) / 30;
  return Math.round((totalM + dayFrac) * MONTH_W);
}
function todayX() {
  return dateToX(new Date().toISOString().slice(0, 10));
}

// ────────────────────────────────────────────────────
//  Hesaplamalar
// ────────────────────────────────────────────────────
function hesaplaKirmiziBayraklar(kayitlar) {
  const flags  = {};
  const lookup = {};
  kayitlar.forEach(k => { lookup[k.id] = k; });
  kayitlar.forEach(r => {
    if (!r.gelistirmeBitis) return;
    const rBitis = new Date(r.gelistirmeBitis + 'T00:00:00');
    (r.iliskiler || []).forEach(lid => {
      const diger = lookup[lid];
      if (!diger || !diger.gelistirmeBitis) return;
      if (new Date(diger.gelistirmeBitis + 'T00:00:00') > rBitis && !flags[r.id]) {
        flags[r.id] =
          `"${diger.ad}" (${diger.id}) bitiş tarihi (${tarihFormatla(diger.gelistirmeBitis)}) ` +
          `bu öğenin bitiş tarihini (${tarihFormatla(r.gelistirmeBitis)}) aşıyor.`;
      }
    });
  });
  return flags;
}

function hesaplaTrlGecikmeleri(kayitlar) {
  const gecik = {};
  const bugun = new Date().toISOString().slice(0, 10);
  kayitlar.forEach(k => {
    if (!k.trlHedefleri || !k.trlHedefleri.length) return;
    const guncel = k.guncelTRL || k.baslangicTRL;
    const gecikmisMilestones = k.trlHedefleri.filter(h =>
      h.tarih && h.hedef && h.tarih <= bugun && guncel < h.hedef
    );
    if (gecikmisMilestones.length > 0) {
      gecik[k.id] = gecikmisMilestones.map(h =>
        `TRL ${h.hedef} hedefi (${tarihFormatla(h.tarih)}) — güncel: TRL ${guncel}`
      );
    }
  });
  return gecik;
}

// ────────────────────────────────────────────────────
//  Render ana fonksiyon
// ────────────────────────────────────────────────────
function yenidenRenderEt() {
  MONTH_W = parseInt(document.getElementById('zoom-sel').value, 10);
  renderRoadmap();
}

function renderRoadmap() {
  const tumKayitlar = tumKayitlariGetir();
  let kayitlar = tumKayitlar.filter(k => k.gelistirmeBaslangic && k.gelistirmeBitis);

  // Filtreleri doldur
  sfDoldur('sf', tumKayitlar.filter(k => k.tur === 'Sistem'));
  const ugDegerleri = [...new Set(
    tumKayitlar.map(k => k.urunGrubu).filter(Boolean)
  )].sort();
  sfDoldur('ug', ugDegerleri.map(v => ({ id: v, ad: v })));

  // ── Filtreleri uygula ──
  if (aktifSistemId) {
    const sis = tumKayitlar.find(k => k.id === aktifSistemId);
    if (sis) {
      const ilgili = new Set([aktifSistemId, ...(sis.iliskiler || [])]);
      kayitlar = kayitlar.filter(k => ilgili.has(k.id));
    }
  }
  if (aktifUrunGrubu) {
    kayitlar = kayitlar.filter(k => k.urunGrubu === aktifUrunGrubu);
  }
  if (aktifSegDurum === 'aktif') {
    kayitlar = kayitlar.filter(k => k.aktif !== false);
  } else if (aktifSegDurum === 'pasif') {
    kayitlar = kayitlar.filter(k => k.aktif === false);
  }

  const sayi = kayitlar.length;
  document.getElementById('rm-kayit-sayisi').textContent =
    sayi > 0 ? `${sayi} kayıt` : '';

  const hasTarihli = tumKayitlar.filter(k => k.gelistirmeBaslangic && k.gelistirmeBitis).length;
  if (hasTarihli === 0) {
    document.getElementById('roadmap-main').style.display = 'none';
    document.getElementById('bos-durum').style.display   = 'flex';
    return;
  }
  document.getElementById('roadmap-main').style.display = 'flex';
  document.getElementById('bos-durum').style.display    = 'none';

  if (kayitlar.length === 0) {
    // Filtre sonucu boş: tüm kayıtlarla çiz (soluklaştırılmış)
    kayitlar = tumKayitlar.filter(k => k.gelistirmeBaslangic && k.gelistirmeBitis);
  }

  // ── Tarih aralığı ──
  const minD = new Date(Math.min(...kayitlar.map(k => new Date(k.gelistirmeBaslangic + 'T00:00:00'))));
  const maxD = new Date(Math.max(...kayitlar.map(k => new Date(k.gelistirmeBitis    + 'T00:00:00'))));

  // Milestone tarihlerini de hesaba kat
  kayitlar.forEach(k => {
    (k.trlHedefleri || []).forEach(h => {
      if (!h.tarih) return;
      const d = new Date(h.tarih + 'T00:00:00');
      if (d < minD) minD.setTime(d.getTime());
      if (d > maxD) maxD.setTime(d.getTime());
    });
  });

  const rangeStart = new Date(minD.getFullYear(), minD.getMonth() - 1, 1);
  const rangeEnd   = new Date(maxD.getFullYear(), maxD.getMonth() + 2, 1);

  baseYear  = rangeStart.getFullYear();
  baseMonth = rangeStart.getMonth();

  const totalMonths =
    (rangeEnd.getFullYear() - baseYear) * 12 +
    (rangeEnd.getMonth()    - baseMonth) + 1;
  const totalW = totalMonths * MONTH_W;

  // ── Gruplama & yükseklikler ──
  const grouped = {};
  TUR_SIRASI.forEach(t => { grouped[t] = kayitlar.filter(k => k.tur === t); });

  const swimTops = {}, swimHeights = {};
  let cumY = 0;
  TUR_SIRASI.forEach(tur => {
    swimTops[tur]    = cumY;
    swimHeights[tur] = Math.max(grouped[tur].length, 1) * ROW_H + 2 * SWIM_PAD;
    cumY += swimHeights[tur];
  });

  const ekstraTops = {}, ekstraHeights = {};
  EKSTRA_SWINLANELER.forEach(lane => {
    ekstraTops[lane.id]    = cumY;
    ekstraHeights[lane.id] = gizliLaneler.has(lane.id) ? EKSTRA_H_KAPALI : EKSTRA_H_ACIK;
    cumY += ekstraHeights[lane.id];
  });

  const totalH = cumY;

  // ── Bar pozisyonları ──
  const barPos = {};
  TUR_SIRASI.forEach(tur => {
    grouped[tur].forEach((k, i) => {
      const x  = dateToX(k.gelistirmeBaslangic);
      const ex = dateToX(k.gelistirmeBitis) + MONTH_W;
      const w  = Math.max(ex - x, 24);
      const y  = swimTops[tur] + SWIM_PAD + i * ROW_H;
      const h  = ROW_H - 8;
      barPos[k.id] = { x, y, w, h, cx: x + w / 2, cy: y + h / 2 };
    });
  });

  // ── Uyarılar ──
  const bayraklar    = hesaplaKirmiziBayraklar(kayitlar);
  const trlGecikler  = hesaplaTrlGecikmeleri(kayitlar);

  renderLeftPanel(swimTops, swimHeights, ekstraTops, ekstraHeights);
  renderTimeline(totalMonths, totalW);
  renderContentArea(totalW, totalH, totalMonths, swimTops, swimHeights, ekstraTops, ekstraHeights);
  renderBars(kayitlar, barPos, bayraklar, trlGecikler);
  renderTrlMilestones(kayitlar, barPos);
  renderConnections(kayitlar, barPos);
}

// ────────────────────────────────────────────────────
function renderLeftPanel(swimTops, swimHeights, ekstraTops, ekstraHeights) {
  document.getElementById('lp-spacer').style.height = TL_H + 'px';

  const turHtml = TUR_SIRASI.map(tur => {
    const renk = turRenkGetir(tur);
    return `<div class="swim-label"
      style="height:${swimHeights[tur]}px;border-left:3px solid ${renk};color:${renk}">
      <span class="swim-label-text">${tur}</span>
    </div>`;
  }).join('');

  const ekstraHtml = EKSTRA_SWINLANELER.map(lane => {
    const kapali = gizliLaneler.has(lane.id);
    return `<div class="swim-label ${kapali ? 'ekstra-kapali' : ''}"
      style="height:${ekstraHeights[lane.id]}px;border-left:3px solid ${lane.renk};color:${lane.renk}">
      <span class="swim-label-text">${lane.etiket}</span>
      <button class="swim-toggle-btn" title="${kapali ? 'Göster' : 'Gizle'}"
              onclick="toggleLane('${lane.id}')"
              style="color:${lane.renk}88">${kapali ? '▶' : '▼'}</button>
    </div>`;
  }).join('');

  document.getElementById('lp-lanes').innerHTML = turHtml + ekstraHtml;
}

// ────────────────────────────────────────────────────
function renderTimeline(totalMonths, totalW) {
  const hdr = document.getElementById('tl-header');
  hdr.style.height = TL_H + 'px';

  const years = [];
  let prevYr = null;
  for (let i = 0; i < totalMonths; i++) {
    const totalM = baseMonth + i;
    const yr = baseYear + Math.floor(totalM / 12);
    if (yr !== prevYr) { years.push({ year: yr, count: 0 }); prevYr = yr; }
    years[years.length - 1].count++;
  }

  const today = new Date();
  let moRow = '';
  for (let i = 0; i < totalMonths; i++) {
    const totalM = baseMonth + i;
    const yr = baseYear + Math.floor(totalM / 12);
    const mo = totalM % 12;
    const cur = yr === today.getFullYear() && mo === today.getMonth();
    moRow += `<div class="tl-month-cell ${cur ? 'current' : ''}" style="width:${MONTH_W}px">${TR_AYLAR[mo]}</div>`;
  }

  hdr.innerHTML =
    `<div class="tl-year-row">${years.map(y =>
      `<div class="tl-year-cell" style="width:${y.count * MONTH_W}px">${y.year}</div>`
    ).join('')}</div>` +
    `<div class="tl-month-row">${moRow}</div>`;
}

// ────────────────────────────────────────────────────
function renderContentArea(totalW, totalH, totalMonths, swimTops, swimHeights, ekstraTops, ekstraHeights) {
  const ca   = document.getElementById('content-area');
  const svg  = document.getElementById('conn-svg');
  const bars = document.getElementById('bars-layer');

  ca.style.width  = totalW + 'px';
  ca.style.height = totalH + 'px';
  svg.setAttribute('width',  totalW);
  svg.setAttribute('height', totalH);
  svg.style.width  = totalW + 'px';
  svg.style.height = totalH + 'px';
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  bars.querySelectorAll('.swim-bg,.grid-ln,.ekstra-placeholder').forEach(el => el.remove());

  TUR_SIRASI.forEach((tur, i) => {
    const d = document.createElement('div');
    d.className = 'swim-bg' + (i % 2 === 1 ? ' alt' : '');
    d.style.top    = swimTops[tur]    + 'px';
    d.style.width  = totalW           + 'px';
    d.style.height = swimHeights[tur] + 'px';
    bars.appendChild(d);
  });

  EKSTRA_SWINLANELER.forEach(lane => {
    const kapali = gizliLaneler.has(lane.id);
    const d = document.createElement('div');
    d.className = 'swim-bg ekstra' + (kapali ? ' ekstra-kapali' : '');
    d.style.top    = ekstraTops[lane.id]    + 'px';
    d.style.width  = totalW                 + 'px';
    d.style.height = ekstraHeights[lane.id] + 'px';
    bars.appendChild(d);
    if (!kapali) {
      const ph = document.createElement('div');
      ph.className  = 'ekstra-placeholder';
      ph.textContent = `— ${lane.etiket} henüz ilişkilendirilmedi —`;
      ph.style.top    = ekstraTops[lane.id] + 'px';
      ph.style.height = ekstraHeights[lane.id] + 'px';
      bars.appendChild(ph);
    }
  });

  const todXX = todayX();
  for (let i = 0; i <= totalMonths; i++) {
    const mo = (baseMonth + i) % 12;
    const ln = document.createElement('div');
    ln.className = 'grid-ln' + (mo === 0 ? ' yr' : '');
    ln.style.left   = (i * MONTH_W) + 'px';
    ln.style.height = totalH + 'px';
    bars.appendChild(ln);
  }
  if (todXX >= 0 && todXX <= totalW) {
    const tl = document.createElement('div');
    tl.className = 'grid-ln now';
    tl.style.left   = todXX + 'px';
    tl.style.height = totalH + 'px';
    tl.innerHTML    = '<div class="now-label">Bugün</div>';
    bars.appendChild(tl);
  }
}

// ────────────────────────────────────────────────────
function renderBars(kayitlar, barPos, bayraklar, trlGecikler) {
  document.getElementById('bars-layer').querySelectorAll('.rm-bar').forEach(el => el.remove());

  kayitlar.forEach(k => {
    const pos = barPos[k.id];
    if (!pos) return;

    const renk   = turRenkGetir(k.tur);
    const bayrak = bayraklar[k.id];
    const trlGec = trlGecikler[k.id];
    const pasif  = k.aktif === false;

    const bar = document.createElement('div');
    bar.className  = 'rm-bar' + (pasif ? ' pasif-bar' : '');
    bar.id         = 'bar-' + k.id;
    bar.dataset.id = k.id;
    bar.style.left        = pos.x + 'px';
    bar.style.top         = pos.y + 'px';
    bar.style.width       = pos.w + 'px';
    bar.style.height      = pos.h + 'px';
    bar.style.background  = renk + '22';
    bar.style.borderColor = renk;
    bar.style.zIndex      = '3';

    const trlAralik   = (k.hedeflenenTRL || 9) - (k.baslangicTRL || 1);
    const trlIlerleme = k.guncelTRL && trlAralik > 0
      ? Math.round(((k.guncelTRL - k.baslangicTRL) / trlAralik) * 100)
      : 0;

    bar.innerHTML = `
      ${bayrak
        ? `<span class="rm-flag" title="${bayrak.replace(/"/g,"'")}"
             onclick="event.stopPropagation()">🚩</span>
           <div class="delay-stripe"></div>`
        : ''}
      ${trlGec && !pasif
        ? `<span class="rm-warn" title="TRL Gecikme: ${trlGec.join(' | ').replace(/"/g,"'")}"
             onclick="event.stopPropagation()">⚠️</span>`
        : ''}
      <span class="rm-bar-label">${k.ad}</span>
      ${k.guncelTRL
        ? `<span class="rm-bar-guncel-trl" title="Güncel TRL">▶${k.guncelTRL}</span>`
        : ''}
      <span class="rm-bar-trl">${k.baslangicTRL}→${k.hedeflenenTRL}</span>
      ${trlIlerleme > 0
        ? `<div class="rm-bar-progress" style="width:${trlIlerleme}%"></div>`
        : ''}
    `;

    bar.addEventListener('click',      ()  => { if (!pasif) location.href = `detail.html?id=${k.id}`; else location.href = `detail.html?id=${k.id}`; });
    bar.addEventListener('mouseenter', (e) => tooltipGoster(e, k, bayrak, trlGec));
    bar.addEventListener('mousemove',  (e) => tooltipHareketEt(e));
    bar.addEventListener('mouseleave', tooltipGizle);

    document.getElementById('bars-layer').appendChild(bar);
  });
}

// ────────────────────────────────────────────────────
function renderTrlMilestones(kayitlar, barPos) {
  document.getElementById('bars-layer').querySelectorAll('.trl-ms-marker').forEach(el => el.remove());

  const bugun = new Date().toISOString().slice(0, 10);

  kayitlar.forEach(k => {
    if (!k.trlHedefleri || !k.trlHedefleri.length) return;
    const pos = barPos[k.id];
    if (!pos) return;

    k.trlHedefleri.forEach(h => {
      if (!h.hedef || !h.tarih) return;
      const mx     = dateToX(h.tarih);
      const guncel = k.guncelTRL || k.baslangicTRL;
      const gecti  = h.tarih <= bugun;
      const karsilandi = gecti && guncel >= h.hedef;
      const gecikti    = gecti && !karsilandi;

      const cls = gecikti ? 'trl-ms-gecik' : (karsilandi ? 'trl-ms-ok' : 'trl-ms-gelec');
      const marker = document.createElement('div');
      marker.className = 'trl-ms-marker ' + cls;
      marker.style.left = (mx - 5) + 'px';
      marker.style.top  = (pos.y - 10) + 'px';
      marker.title =
        `TRL ${h.hedef} hedefi — ${tarihFormatla(h.tarih)}` +
        (gecikti    ? ` ⚠️ GECİKMİŞ (Güncel: TRL ${guncel})` : '') +
        (karsilandi ? ` ✅ Karşılandı` : '') +
        (!gecti     ? ` 🎯 Planlı` : '');
      document.getElementById('bars-layer').appendChild(marker);
    });
  });
}

// ────────────────────────────────────────────────────
function renderConnections(kayitlar, barPos) {
  const svg    = document.getElementById('conn-svg');
  const lookup = {};
  kayitlar.forEach(k => { lookup[k.id] = k; });

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = `
    <marker id="arr" markerWidth="7" markerHeight="5"
            refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="rgba(255,255,255,0.25)"/>
    </marker>`;
  svg.appendChild(defs);

  const cizildi = new Set();
  kayitlar.forEach(r => {
    const posR = barPos[r.id];
    if (!posR) return;
    (r.iliskiler || []).forEach(lid => {
      const key = [r.id, lid].sort().join('||');
      if (cizildi.has(key)) return;
      cizildi.add(key);
      const other = lookup[lid];
      if (!other) return;
      const posO = barPos[lid];
      if (!posO) return;

      let x1, y1, x2, y2;
      if (posR.cx <= posO.cx) {
        x1 = posR.x + posR.w; y1 = posR.cy;
        x2 = posO.x;           y2 = posO.cy;
      } else {
        x1 = posO.x + posO.w; y1 = posO.cy;
        x2 = posR.x;           y2 = posR.cy;
      }
      const dx = Math.max(Math.abs(x2 - x1) * 0.45, 45);

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${x1} ${y1} C ${x1+dx} ${y1} ${x2-dx} ${y2} ${x2} ${y2}`);
      path.setAttribute('stroke',          'rgba(255,255,255,0.18)');
      path.setAttribute('stroke-width',    '1.5');
      path.setAttribute('fill',            'none');
      path.setAttribute('stroke-dasharray','5,4');
      path.setAttribute('marker-end',      'url(#arr)');
      path.addEventListener('mouseenter', () => {
        path.setAttribute('stroke', 'rgba(255,255,255,0.6)');
        path.setAttribute('stroke-width', '2.5');
      });
      path.addEventListener('mouseleave', () => {
        path.setAttribute('stroke', 'rgba(255,255,255,0.18)');
        path.setAttribute('stroke-width', '1.5');
      });
      svg.appendChild(path);
    });
  });
}

// ────────────────────────────────────────────────────
//  Ekstra Lane Toggle
// ────────────────────────────────────────────────────
function toggleLane(laneId) {
  if (gizliLaneler.has(laneId)) gizliLaneler.delete(laneId);
  else                          gizliLaneler.add(laneId);
  renderRoadmap();
}

// ────────────────────────────────────────────────────
//  Aktif/Pasif Segment
// ────────────────────────────────────────────────────
function aktifSegSec(durum) {
  aktifSegDurum = durum;
  ['tumumu','aktif','pasif'].forEach(d => {
    document.getElementById('seg-' + d).classList.toggle('secili', d === durum);
  });
  renderRoadmap();
}

// ────────────────────────────────────────────────────
//  Searchable Dropdown (paylaşımlı: 'sf' = Sistem, 'ug' = Ürün Grubu)
// ────────────────────────────────────────────────────
let sfAcikMap = { sf: false, ug: false };
let sfVeriMap = { sf: [], ug: [] };

function sfDoldur(ns, liste) {
  // liste: [{id, ad}] ya da [{id:k.id, ad:k.ad}] formatında
  sfVeriMap[ns] = liste.map(x => typeof x === 'object' ? x : { id: x, ad: x });
  sfListeRenderEt(ns, '');
}

function sfListeRenderEt(ns, aramaMetni) {
  const listeEl = document.getElementById(ns + '-liste');
  if (!listeEl) return;
  const filtre   = aramaMetni.trim().toLowerCase();
  const aktifId  = ns === 'sf' ? aktifSistemId : aktifUrunGrubu;
  const tumLabel = ns === 'sf' ? 'Tüm Sistemler' : 'Tüm Ürün Grupları';

  const sonuclar = filtre
    ? sfVeriMap[ns].filter(x => x.ad.toLowerCase().includes(filtre) || x.id.toLowerCase().includes(filtre))
    : sfVeriMap[ns];

  let html = `<div class="sf-item sf-tumumu ${!aktifId ? 'secili' : ''}"
    onclick="sfSec('${ns}', null, '${tumLabel}')">${tumLabel}</div>`;

  if (sonuclar.length === 0) {
    html += `<div class="sf-bos">Sonuç bulunamadı</div>`;
  } else {
    html += sonuclar.map(x => {
      const monospace = ns === 'sf'
        ? `<span style="font-family:monospace;font-size:10px;opacity:.45;margin-right:5px">${x.id}</span>`
        : '';
      return `<div class="sf-item ${aktifId === x.id ? 'secili' : ''}"
        onclick="sfSec('${ns}','${x.id.replace(/'/g,"\\'")}','${x.ad.replace(/'/g,"\\'")}')">
        ${monospace}${x.ad}
      </div>`;
    }).join('');
  }
  listeEl.innerHTML = html;
}

function sfToggle(ns) {
  const acik = !sfAcikMap[ns];
  // Diğerini kapat
  Object.keys(sfAcikMap).forEach(k => {
    sfAcikMap[k] = false;
    document.getElementById(k + '-panel').classList.remove('acik');
    document.getElementById(k + '-arrow').classList.remove('acik');
  });
  sfAcikMap[ns] = acik;
  document.getElementById(ns + '-panel').classList.toggle('acik', acik);
  document.getElementById(ns + '-arrow').classList.toggle('acik', acik);
  if (acik) {
    setTimeout(() => document.getElementById(ns + '-arama').focus(), 50);
    sfListeRenderEt(ns, '');
  }
}

function sfFiltrele(ns) {
  sfListeRenderEt(ns, document.getElementById(ns + '-arama').value);
}

function sfSec(ns, id, ad) {
  if (ns === 'sf') aktifSistemId  = id;
  else             aktifUrunGrubu = id;

  document.getElementById(ns + '-label').textContent = ad;
  document.getElementById(ns + '-trigger').classList.toggle('aktif', !!id);
  document.getElementById(ns + '-arama').value = '';
  sfAcikMap[ns] = false;
  document.getElementById(ns + '-panel').classList.remove('acik');
  document.getElementById(ns + '-arrow').classList.remove('acik');
  renderRoadmap();
}

document.addEventListener('click', e => {
  ['sf', 'ug'].forEach(ns => {
    if (sfAcikMap[ns]) {
      const wrap = document.getElementById(ns === 'sf' ? 'sistem-filtre' : 'ug-filtre');
      if (!wrap.contains(e.target)) {
        sfAcikMap[ns] = false;
        document.getElementById(ns + '-panel').classList.remove('acik');
        document.getElementById(ns + '-arrow').classList.remove('acik');
      }
    }
  });
});

// ────────────────────────────────────────────────────
//  Tooltip
// ────────────────────────────────────────────────────
function tooltipGoster(e, k, bayrak, trlGec) {
  const tip  = document.getElementById('tooltip');
  const renk = turRenkGetir(k.tur);

  tip.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="background:${renk}20;color:${renk};
                   border:1px solid ${renk}50;padding:2px 9px;
                   border-radius:12px;font-size:11px;font-weight:700">${k.tur}</span>
      <span style="font-family:monospace;font-size:11px;color:var(--text2)">${k.id}</span>
      ${k.aktif === false
        ? `<span style="background:#e9456020;color:#e94560;border:1px solid #e9456040;
                        padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700">Pasif</span>`
        : ''}
    </div>
    <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text)">${k.ad}</div>
    <div style="color:var(--text2);display:flex;flex-direction:column;gap:3px;font-size:12px">
      <div>📅 ${tarihFormatla(k.gelistirmeBaslangic)} → ${tarihFormatla(k.gelistirmeBitis)}</div>
      <div>📊 TRL ${k.baslangicTRL} ${k.guncelTRL ? `→ <strong style="color:#fff">▶${k.guncelTRL}</strong>` : ''} → ${k.hedeflenenTRL}</div>
      <div>👤 ${k.sorumlu || '—'}</div>
      ${k.butce ? `<div>💰 ${butceFormatla(k.butce)}</div>` : ''}
      ${(k.iliskiler||[]).length ? `<div>🔗 ${k.iliskiler.length} bağlantı</div>` : ''}
      ${k.urunGrubu ? `<div>📦 ${k.urunGrubu}</div>` : ''}
    </div>
    ${bayrak ? `
      <div style="margin-top:8px;padding:6px 10px;
                  background:#e9456020;border:1px solid #e9456040;
                  border-radius:7px;font-size:11px;color:#ff7a93;line-height:1.5">
        🚩 ${bayrak}
      </div>` : ''}
    ${trlGec ? `
      <div style="margin-top:6px;padding:6px 10px;
                  background:#f7a44f18;border:1px solid #f7a44f40;
                  border-radius:7px;font-size:11px;color:#f7a44f;line-height:1.5">
        ${trlGec.map(m => `⚠️ ${m}`).join('<br>')}
      </div>` : ''}
  `;
  tip.style.display = 'block';
  tooltipHareketEt(e);
}

function tooltipHareketEt(e) {
  const tip = document.getElementById('tooltip');
  const mg  = 16;
  let lft = e.clientX + mg;
  let top = e.clientY + mg;
  if (lft + 330 > window.innerWidth)  lft = e.clientX - 330 - mg;
  if (top + 240 > window.innerHeight) top = e.clientY - 240 - mg;
  tip.style.left = lft + 'px';
  tip.style.top  = top + 'px';
}

function tooltipGizle() {
  document.getElementById('tooltip').style.display = 'none';
}

// ────────────────────────────────────────────────────
//  Bugüne Kaydır
// ────────────────────────────────────────────────────
function bugunKaydır() {
  const rp = document.getElementById('right-panel');
  rp.scrollLeft = Math.max(0, todayX() - rp.clientWidth / 2);
}

// ────────────────────────────────────────────────────
//  Başlat
// ────────────────────────────────────────────────────
renderRoadmap();

let rzTimer;
window.addEventListener('resize', () => {
  clearTimeout(rzTimer);
  rzTimer = setTimeout(renderRoadmap, 180);
});
</script>
